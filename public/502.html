<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>502 Bad Gateway - Static Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #0b0f19;
            color: #e2e8f0;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        
        .bg-glow {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(62,207,207,0.15) 0%, rgba(139,92,246,0.1) 50%, rgba(11,15,25,0) 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 1; pointer-events: none;
            animation: pulse 8s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        .card {
            position: relative; z-index: 10;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 60px 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gradient-text {
            font-family: 'Outfit', sans-serif;
            font-size: 80px;
            line-height: 1;
            margin: 0;
            background: linear-gradient(135deg, #3ECFCF 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 12px rgba(62, 207, 207, 0.3));
        }

        .title {
            font-size: 24px; font-weight: 600; color: #f8fafc;
            margin: 16px 0 12px;
        }

        .desc {
            font-size: 15px; color: #94a3b8; line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, rgba(62,207,207,0.1) 0%, rgba(139,92,246,0.1) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            color: #f8fafc; font-weight: 500; font-size: 15px;
            padding: 12px 28px; border-radius: 12px;
            text-decoration: none; cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: linear-gradient(135deg, rgba(62,207,207,0.2) 0%, rgba(139,92,246,0.2) 100%);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(139,92,246,0.3);
        }

        .sys-status {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-top: 32px; font-size: 13px; color: #64748b;
        }

        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #f59e0b;
            box-shadow: 0 0 10px #f59e0b;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="card">
        <h1 class="gradient-text">502</h1>
        <div class="title">System Reconnecting</div>
        <div class="desc">Static Engine is currently undergoing a brief restart or update. Our servers are working to get things back online instantly.</div>
        <a href="" onclick="window.location.reload(); return false;" class="btn">
            Refresh Page
        </a>
        <div class="sys-status">
            <div class="dot"></div>
            <span>Auto-reconnecting...</span>
        </div>
    </div>

    <script>
        // Auto-refresh mechanism
        let attempts = 0;
        const checkServer = () => {
            fetch(window.location.href, { method: 'HEAD', cache: 'no-store' })
                .then(res => {
                    if (res.ok || (res.status < 500 && res.status !== 502)) {
                        window.location.reload();
                    }
                })
                .catch(() => {});
            
            attempts++;
            // Try every 5 seconds, up to 12 times (1 min), then slow down
            setTimeout(checkServer, attempts > 12 ? 10000 : 5000);
        };
        setTimeout(checkServer, 5000);
    </script>
</body>
</html>
